# ============================================
# Student Management System - Application Configuration
# ============================================
 
# Application Name and Identification
spring.application.name=sbapp11
 
# ============================================
# SERVER CONFIGURATION
# ============================================
 
# Server Port - Application runs on port 4455
# Access the API at: http://localhost:4455/api/v1
server.port=4455
# ============================================
# DATABASE CONFIGURATION (MySQL)
# ============================================
 
# MySQL JDBC Driver Class
# Specifies the driver for MySQL database connection

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Database URL
# Host: localhost
# Port: 3306 (default MySQL port)
# Database Name: Batch61
spring.datasource.url=jdbc:mysql://localhost:3306/Batch61
# Database Username
# Default MySQL username: root
spring.datasource.username=root
# Database Password
# Default MySQL password: root
# NOTE: In production, use environment variables for sensitive data
spring.datasource.password=root
# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
 
# Hibernate DDL Auto Strategy
# Options: create, create-drop, validate, update
# 'update' - Automatically updates the schema without dropping existing data
spring.jpa.hibernate.ddl-auto=update
# Show SQL Statements
# Set to 'true' to print SQL queries in console for debugging
# Useful during development to see actual database queries


# ============================================
# API ENDPOINTS
# ============================================
# Base URL: http://localhost:4455/api/v1
#
# GET    /getStudent12              - Get all students
# GET    /getStud/{sid}             - Get student by ID
# GET    /getst/{name}              - Get student by name
# POST   /insertStudent12           - Create new student
# POST   /updateStudent12/{sid}     - Update student (complete)
# PATCH  /patchStudent/{sid}        - Update student (partial)
# DELETE /deleteStudent12/{sid}     - Delete student by ID
spring.jpa.show-sql=true
